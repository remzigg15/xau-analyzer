<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XAUUSD AI Analyzer</title>

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding:20px;
}
.card{
background:#1c1c1c;
padding:20px;
border-radius:15px;
margin-top:20px;
}
.buy{color:lime;}
.sell{color:red;}
.wait{color:orange;}
</style>
</head>

<body>

<h1>XAUUSD Analyzer</h1>

<div class="card">
<h2>Price</h2>
<h1 id="price">Loading...</h1>
</div>

<div class="card">
<h2>Signal</h2>
<h1 id="signal" class="wait">WAIT</h1>
<p>Strength: <span id="strength">0</span>%</p>
</div>

<script>

// 🔥 БЕСПЛАТНЫЙ источник цены (может иногда задерживаться)
const API = "https://query1.finance.yahoo.com/v7/finance/quote?symbols=XAUUSD=X";

let prices = [];

async function getPrice(){
try {
let res = await fetch(API);
let data = await res.json();

let price = data.quoteResponse.result[0].regularMarketPrice;

document.getElementById("price").innerText = price;

// сохраняем историю
prices.push(price);
if(prices.length > 20) prices.shift();

// анализ
analyze(prices);

} catch(e){
document.getElementById("price").innerText = "error";
}
}

function analyze(p){

if(p.length < 10) return;

let last = p[p.length-1];
let prev = p[p.length-5];

// простая логика тренда
let trend = last > prev;

// сила движения
let strength = Math.abs(last - prev) * 100;

let signal = "WAIT";
let cls = "wait";

if(trend && strength > 2){
signal = "BUY";
cls = "buy";
}
else if(!trend && strength > 2){
signal = "SELL";
cls = "sell";
}

document.getElementById("signal").innerText = signal;
document.getElementById("signal").className = cls;
document.getElementById("strength").innerText = strength.toFixed(2);
}

getPrice();
setInterval(getPrice, 5000);

</script>

</body>
</html>
